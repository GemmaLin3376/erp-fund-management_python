{% extends "base.html" %}

{% block title %}收款账户详情 - 基础ERP资金管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">收款账户详情</h2>
        <div>
            <a href="{{ url_for('account.edit_account', id=account.id) }}" class="btn btn-primary">编辑</a>
            <button class="btn btn-danger" onclick="confirmDelete('{{ url_for('account.delete_account', id=account.id) }}', '确定要删除账户 {{ account.name }} 吗？')">删除</button>
            <a href="{{ url_for('account.list_accounts') }}" class="btn btn-secondary">返回</a>
        </div>
    </div>
    <div class="card-body">
        <div class="detail-row">
            <div class="detail-label">账户编码</div>
            <div class="detail-value">{{ account.code }}</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">账户名称</div>
            <div class="detail-value">{{ account.name }}</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">创建时间</div>
            <div class="detail-value">{{ account.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">更新时间</div>
            <div class="detail-value">{{ account.updated_at.strftime('%Y-%m-%d %H:%M:%S') }}</div>
        </div>
    </div>
</div>
{% endblock %}
